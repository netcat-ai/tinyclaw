name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Go Test
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Unit Test
        run: go test ./...
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/wecom/finance/lib

      - name: Integration Test
        run: |
          go test ./sandbox/ -tags integration -v -count=1
          go test . -tags integration -v -count=1 -run TestEgress
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/wecom/finance/lib
          REDIS_ADDR: localhost:6379

  build-image:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Service Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/tinyclaw:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/tinyclaw:latest
          platforms: linux/amd64

      - name: Build Agent Image
        uses: docker/build-push-action@v6
        with:
          context: ./agent
          file: ./agent/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/tinyclaw-agent:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/tinyclaw-agent:latest
          platforms: linux/amd64
