name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Go Test
    runs-on: ubuntu-24.04
    container:
      image: golang:1.26.1-bookworm
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Go Version
        run: go version

      - name: Unit Test
        run: go test ./...
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/wecom/finance/lib

  build-image:
    name: Docker Build
    runs-on: ubuntu-24.04
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Service Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/tinyclaw:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/tinyclaw:latest
          platforms: linux/amd64
