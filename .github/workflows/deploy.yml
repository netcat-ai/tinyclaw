name: Deploy

on:
  workflow_run:
    workflows: ["Build"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy. Leave empty to use triggering commit SHA."
        required: false
        type: string

jobs:
  deploy-claw:
    name: Deploy To K8s Claw
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main')
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Connect tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Set kube context
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}
          context: default

      - name: Verify cluster access
        run: kubectl cluster-info

      - name: Ensure namespace claw
        run: kubectl apply -f k8s/namespace.yaml

      - name: Apply RBAC
        run: kubectl apply -f k8s/rbac.yaml

      - name: Apply runtime config
        env:
          DEFAULT_IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          MANUAL_IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag || '' }}
          WECOM_CORP_ID: ${{ vars.WECOM_CORP_ID }}
          WECOM_BOT_ID: ${{ vars.WECOM_BOT_ID }}
          WECOM_ENABLED: ${{ vars.WECOM_ENABLED }}
          WECOM_POLL_INTERVAL: ${{ vars.WECOM_POLL_INTERVAL }}
          WECOM_POLL_LIMIT: ${{ vars.WECOM_POLL_LIMIT }}
          WECOM_SDK_TIMEOUT: ${{ vars.WECOM_SDK_TIMEOUT }}
          WECOM_START_SEQ: ${{ vars.WECOM_START_SEQ }}
          CONTROL_API_ADDR: ${{ vars.CONTROL_API_ADDR }}
          METRICS_ADDR: ${{ vars.METRICS_ADDR }}
          AGENT_RUNNER: ${{ vars.AGENT_RUNNER }}
          CODEX_WORKDIR: ${{ vars.CODEX_WORKDIR }}
          CODEX_MODEL: ${{ vars.CODEX_MODEL }}
          CODEX_SANDBOX: ${{ vars.CODEX_SANDBOX }}
          CODEX_BASE_URL: ${{ vars.CODEX_BASE_URL }}
          CODEX_API_KEY_ENV: ${{ vars.CODEX_API_KEY_ENV }}
          ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CLAWMAN_API_TOKEN: ${{ secrets.CLAWMAN_API_TOKEN }}
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
          WECOM_CORP_SECRET: ${{ secrets.WECOM_CORP_SECRET }}
          WECOM_RSA_PRIVATE_KEY: ${{ secrets.WECOM_RSA_PRIVATE_KEY }}
          WECOM_CONTACT_SECRET: ${{ secrets.WECOM_CONTACT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          : "${WECOM_BOT_ID:=}"
          : "${CONTROL_API_ADDR:=:8081}"
          : "${METRICS_ADDR:=:9090}"
          : "${AGENT_RUNNER:=codex}"
          : "${CODEX_WORKDIR:=/tmp}"
          : "${CODEX_MODEL:=gpt-5.5}"
          : "${CODEX_SANDBOX:=read-only}"
          : "${ANTHROPIC_BASE_URL:=https://api.anthropic.com}"
          : "${CODEX_BASE_URL:=${ANTHROPIC_BASE_URL}}"
          : "${CODEX_API_KEY_ENV:=ANTHROPIC_API_KEY}"
          : "${WECOM_ENABLED:=true}"
          : "${WECOM_POLL_INTERVAL:=3s}"
          : "${WECOM_POLL_LIMIT:=100}"
          : "${WECOM_SDK_TIMEOUT:=30}"
          : "${WECOM_START_SEQ:=0}"
          kubectl -n claw create configmap tinyclaw-config \
            --from-literal=WECOM_CORP_ID="${WECOM_CORP_ID}" \
            --from-literal=WECOM_BOT_ID="${WECOM_BOT_ID}" \
            --from-literal=WECOM_ENABLED="${WECOM_ENABLED}" \
            --from-literal=WECOM_POLL_INTERVAL="${WECOM_POLL_INTERVAL}" \
            --from-literal=WECOM_POLL_LIMIT="${WECOM_POLL_LIMIT}" \
            --from-literal=WECOM_SDK_TIMEOUT="${WECOM_SDK_TIMEOUT}" \
            --from-literal=WECOM_START_SEQ="${WECOM_START_SEQ}" \
            --from-literal=CONTROL_API_ADDR="${CONTROL_API_ADDR}" \
            --from-literal=METRICS_ADDR="${METRICS_ADDR}" \
            --from-literal=AGENT_RUNNER="${AGENT_RUNNER}" \
            --from-literal=CODEX_WORKDIR="${CODEX_WORKDIR}" \
            --from-literal=CODEX_MODEL="${CODEX_MODEL}" \
            --from-literal=CODEX_SANDBOX="${CODEX_SANDBOX}" \
            --from-literal=CODEX_BASE_URL="${CODEX_BASE_URL}" \
            --from-literal=CODEX_API_KEY_ENV="${CODEX_API_KEY_ENV}" \
            --from-literal=ANTHROPIC_BASE_URL="${ANTHROPIC_BASE_URL}" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n claw create secret generic tinyclaw-secret \
            --from-literal=DATABASE_URL="${DATABASE_URL}" \
            --from-literal=CLAWMAN_API_TOKEN="${CLAWMAN_API_TOKEN}" \
            --from-literal=CODEX_AUTH_JSON="${CODEX_AUTH_JSON}" \
            --from-literal=WECOM_CORP_SECRET="${WECOM_CORP_SECRET}" \
            --from-literal=WECOM_RSA_PRIVATE_KEY="${WECOM_RSA_PRIVATE_KEY}" \
            --from-literal=WECOM_CONTACT_SECRET="${WECOM_CONTACT_SECRET}" \
            --from-literal=ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply deployment
        run: |
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/deployment.yaml

      - name: Update image
        env:
          DEFAULT_IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          MANUAL_IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag || '' }}
        run: |
          IMAGE_TAG="${MANUAL_IMAGE_TAG:-$DEFAULT_IMAGE_TAG}"
          IMAGE_REF="ghcr.io/${{ github.repository_owner }}/tinyclaw:${IMAGE_TAG}"
          kubectl -n claw set image deployment/clawman clawman="${IMAGE_REF}"

      - name: Wait rollout
        run: |
          kubectl -n claw rollout status deployment/clawman --timeout=300s
