name: Deploy

on:
  workflow_run:
    workflows: ["Build"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy. Leave empty to use triggering commit SHA."
        required: false
        type: string

jobs:
  deploy-claw:
    name: Deploy To K8s Claw
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main')
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Connect tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Set kube context
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}
          context: default

      - name: Verify cluster access
        run: kubectl cluster-info

      - name: Ensure namespace claw
        run: kubectl apply -f k8s/namespace.yaml

      - name: Apply RBAC
        run: kubectl apply -f k8s/rbac.yaml

      - name: Apply runtime config
        env:
          DEFAULT_IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          MANUAL_IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag || '' }}
          CONTROL_API_ADDR: ${{ vars.CONTROL_API_ADDR }}
          METRICS_ADDR: ${{ vars.METRICS_ADDR }}
          AGENT_RUNNER: ${{ vars.AGENT_RUNNER }}
          CODEX_WORKDIR: ${{ vars.CODEX_WORKDIR }}
          CODEX_MODEL: ${{ vars.CODEX_MODEL }}
          CODEX_SANDBOX: ${{ vars.CODEX_SANDBOX }}
          CODEX_DISABLED_FEATURES: ${{ vars.CODEX_DISABLED_FEATURES }}
          DRAW_COMMAND_ENABLED: ${{ vars.DRAW_COMMAND_ENABLED }}
          IMAGE_PROVIDER_BASE_URL: ${{ vars.IMAGE_PROVIDER_BASE_URL }}
          IMAGE_PROVIDER_MODEL: ${{ vars.IMAGE_PROVIDER_MODEL }}
          DRAW_IMAGE_SIZE: ${{ vars.DRAW_IMAGE_SIZE }}
          GENERATED_MEDIA_S3_ENDPOINT: ${{ vars.GENERATED_MEDIA_S3_ENDPOINT }}
          GENERATED_MEDIA_S3_BUCKET: ${{ vars.GENERATED_MEDIA_S3_BUCKET }}
          GENERATED_MEDIA_S3_REGION: ${{ vars.GENERATED_MEDIA_S3_REGION }}
          GENERATED_MEDIA_S3_FORCE_PATH_STYLE: ${{ vars.GENERATED_MEDIA_S3_FORCE_PATH_STYLE }}
          GENERATED_MEDIA_URL_TTL: ${{ vars.GENERATED_MEDIA_URL_TTL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CLAWMAN_API_TOKEN: ${{ secrets.CLAWMAN_API_TOKEN }}
          CLAWMAN_ADMIN_SECRET: ${{ secrets.CLAWMAN_ADMIN_SECRET }}
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
          CODEX_CONFIG_TOML: ${{ secrets.CODEX_CONFIG_TOML }}
          IMAGE_PROVIDER_API_KEY: ${{ secrets.IMAGE_PROVIDER_API_KEY }}
          GENERATED_MEDIA_S3_ACCESS_KEY_ID: ${{ secrets.GENERATED_MEDIA_S3_ACCESS_KEY_ID }}
          GENERATED_MEDIA_S3_SECRET_ACCESS_KEY: ${{ secrets.GENERATED_MEDIA_S3_SECRET_ACCESS_KEY }}
        run: |
          : "${CONTROL_API_ADDR:=:8081}"
          : "${METRICS_ADDR:=:9090}"
          : "${AGENT_RUNNER:=codex}"
          : "${CODEX_WORKDIR:=/tmp}"
          : "${CODEX_MODEL:=gpt-5.5}"
          : "${CODEX_SANDBOX:=danger-full-access}"
          : "${CODEX_DISABLED_FEATURES:=apps,tool_suggest,plugins}"
          : "${DRAW_COMMAND_ENABLED:=true}"
          : "${IMAGE_PROVIDER_BASE_URL:=https://code.v4.chat}"
          : "${IMAGE_PROVIDER_MODEL:=gpt-image-2}"
          : "${DRAW_IMAGE_SIZE:=1024x1024}"
          : "${GENERATED_MEDIA_S3_ENDPOINT:=https://cos.ap-guangzhou.myqcloud.com}"
          : "${GENERATED_MEDIA_S3_BUCKET:=claw-1371598192}"
          : "${GENERATED_MEDIA_S3_REGION:=ap-guangzhou}"
          : "${GENERATED_MEDIA_S3_FORCE_PATH_STYLE:=false}"
          : "${GENERATED_MEDIA_URL_TTL:=24h}"
          if [ -z "${CODEX_CONFIG_TOML}" ]; then
            CODEX_CONFIG_TOML="$(cat <<'EOF'
          model_provider = "OpenAI"
          model = "gpt-5.5"
          review_model = "gpt-5.5"
          model_reasoning_effort = "xhigh"
          disable_response_storage = true
          network_access = "enabled"
          windows_wsl_setup_acknowledged = true
          model_context_window = 1000000
          model_auto_compact_token_limit = 900000

          [model_providers.OpenAI]
          name = "OpenAI"
          base_url = "https://code.v4.chat"
          wire_api = "responses"
          requires_openai_auth = true
          EOF
          )"
          fi
          kubectl -n claw create configmap tinyclaw-config \
            --from-literal=CONTROL_API_ADDR="${CONTROL_API_ADDR}" \
            --from-literal=METRICS_ADDR="${METRICS_ADDR}" \
            --from-literal=AGENT_RUNNER="${AGENT_RUNNER}" \
            --from-literal=CODEX_WORKDIR="${CODEX_WORKDIR}" \
            --from-literal=CODEX_MODEL="${CODEX_MODEL}" \
            --from-literal=CODEX_SANDBOX="${CODEX_SANDBOX}" \
            --from-literal=CODEX_DISABLED_FEATURES="${CODEX_DISABLED_FEATURES}" \
            --from-literal=DRAW_COMMAND_ENABLED="${DRAW_COMMAND_ENABLED}" \
            --from-literal=IMAGE_PROVIDER_BASE_URL="${IMAGE_PROVIDER_BASE_URL}" \
            --from-literal=IMAGE_PROVIDER_MODEL="${IMAGE_PROVIDER_MODEL}" \
            --from-literal=DRAW_IMAGE_SIZE="${DRAW_IMAGE_SIZE}" \
            --from-literal=GENERATED_MEDIA_S3_ENDPOINT="${GENERATED_MEDIA_S3_ENDPOINT}" \
            --from-literal=GENERATED_MEDIA_S3_BUCKET="${GENERATED_MEDIA_S3_BUCKET}" \
            --from-literal=GENERATED_MEDIA_S3_REGION="${GENERATED_MEDIA_S3_REGION}" \
            --from-literal=GENERATED_MEDIA_S3_FORCE_PATH_STYLE="${GENERATED_MEDIA_S3_FORCE_PATH_STYLE}" \
            --from-literal=GENERATED_MEDIA_URL_TTL="${GENERATED_MEDIA_URL_TTL}" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n claw create secret generic tinyclaw-secret \
            --from-literal=DATABASE_URL="${DATABASE_URL}" \
            --from-literal=CLAWMAN_API_TOKEN="${CLAWMAN_API_TOKEN}" \
            --from-literal=CLAWMAN_ADMIN_SECRET="${CLAWMAN_ADMIN_SECRET}" \
            --from-literal=CODEX_AUTH_JSON="${CODEX_AUTH_JSON}" \
            --from-literal=CODEX_CONFIG_TOML="${CODEX_CONFIG_TOML}" \
            --from-literal=IMAGE_PROVIDER_API_KEY="${IMAGE_PROVIDER_API_KEY}" \
            --from-literal=GENERATED_MEDIA_S3_ACCESS_KEY_ID="${GENERATED_MEDIA_S3_ACCESS_KEY_ID}" \
            --from-literal=GENERATED_MEDIA_S3_SECRET_ACCESS_KEY="${GENERATED_MEDIA_S3_SECRET_ACCESS_KEY}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply deployment
        env:
          DEFAULT_IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          MANUAL_IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag || '' }}
        run: |
          IMAGE_TAG="${MANUAL_IMAGE_TAG:-$DEFAULT_IMAGE_TAG}"
          IMAGE_REF="ghcr.io/${{ github.repository_owner }}/tinyclaw:${IMAGE_TAG}"
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml
          sed "s|ghcr.io/netcat-ai/tinyclaw:IMAGE_PLACEHOLDER|${IMAGE_REF}|g" k8s/deployment.yaml | kubectl apply -f -

      - name: Wait rollout
        run: |
          kubectl -n claw rollout status deployment/clawman --timeout=1800s
