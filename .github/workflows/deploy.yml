name: Deploy

on:
  workflow_run:
    workflows: ["Build"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy. Leave empty to use triggering commit SHA."
        required: false
        type: string

jobs:
  deploy-claw:
    name: Deploy To K8s Claw
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main')
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Connect tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Set kube context
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}
          context: default

      - name: Verify cluster access
        run: kubectl cluster-info

      - name: Ensure namespace claw
        run: kubectl apply -f k8s/namespace.yaml

      - name: Apply RBAC
        run: kubectl apply -f k8s/rbac.yaml

      - name: Apply runtime config
        env:
          DEFAULT_IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          MANUAL_IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag || '' }}
          WECOM_CORP_ID: ${{ vars.WECOM_CORP_ID }}
          WECOM_BOT_ID: ${{ vars.WECOM_BOT_ID }}
          WECOM_APP_CLIENT_ID: ${{ vars.WECOM_APP_CLIENT_ID }}
          SANDBOX_TEMPLATE_NAME: ${{ vars.SANDBOX_TEMPLATE_NAME }}
          CONTROL_API_ADDR: ${{ vars.CONTROL_API_ADDR }}
          CLAWMAN_GRPC_ADDR: ${{ vars.CLAWMAN_GRPC_ADDR }}
          CLAWMAN_GRPC_LISTEN_ADDR: ${{ vars.CLAWMAN_GRPC_LISTEN_ADDR }}
          ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WECOM_CORP_SECRET: ${{ secrets.WECOM_CORP_SECRET }}
          WECOM_RSA_PRIVATE_KEY: ${{ secrets.WECOM_RSA_PRIVATE_KEY }}
          WECOM_CONTACT_SECRET: ${{ secrets.WECOM_CONTACT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          : "${WECOM_BOT_ID:=}"
          : "${SANDBOX_TEMPLATE_NAME:=tinyclaw-agent-template}"
          : "${CONTROL_API_ADDR:=:8081}"
          : "${CLAWMAN_GRPC_ADDR:=clawman.claw.svc.cluster.local:8092}"
          : "${CLAWMAN_GRPC_LISTEN_ADDR:=:8092}"
          : "${ANTHROPIC_BASE_URL:=https://api.anthropic.com}"
          kubectl -n claw create configmap tinyclaw-config \
            --from-literal=WECOM_CORP_ID="${WECOM_CORP_ID}" \
            --from-literal=WECOM_BOT_ID="${WECOM_BOT_ID}" \
            --from-literal=WECOM_APP_CLIENT_ID="${WECOM_APP_CLIENT_ID}" \
            --from-literal=SANDBOX_TEMPLATE_NAME="${SANDBOX_TEMPLATE_NAME}" \
            --from-literal=CONTROL_API_ADDR="${CONTROL_API_ADDR}" \
            --from-literal=CLAWMAN_GRPC_ADDR="${CLAWMAN_GRPC_ADDR}" \
            --from-literal=CLAWMAN_GRPC_LISTEN_ADDR="${CLAWMAN_GRPC_LISTEN_ADDR}" \
            --from-literal=ANTHROPIC_BASE_URL="${ANTHROPIC_BASE_URL}" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n claw create secret generic tinyclaw-secret \
            --from-literal=DATABASE_URL="${DATABASE_URL}" \
            --from-literal=WECOM_CORP_SECRET="${WECOM_CORP_SECRET}" \
            --from-literal=WECOM_RSA_PRIVATE_KEY="${WECOM_RSA_PRIVATE_KEY}" \
            --from-literal=WECOM_CONTACT_SECRET="${WECOM_CONTACT_SECRET}" \
            --from-literal=ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply sandbox template
        env:
          DEFAULT_IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          MANUAL_IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag || '' }}
        run: |
          IMAGE_TAG="${MANUAL_IMAGE_TAG:-$DEFAULT_IMAGE_TAG}"
          AGENT_IMAGE_REF="ghcr.io/${{ github.repository_owner }}/tinyclaw-agent:${IMAGE_TAG}"
          sed "s|IMAGE_PLACEHOLDER|${AGENT_IMAGE_REF}|g" k8s/sandboxtemplate.yaml | kubectl apply -f -

      - name: Apply deployment
        run: |
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/deployment.yaml

      - name: Update image
        env:
          DEFAULT_IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          MANUAL_IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag || '' }}
        run: |
          IMAGE_TAG="${MANUAL_IMAGE_TAG:-$DEFAULT_IMAGE_TAG}"
          IMAGE_REF="ghcr.io/${{ github.repository_owner }}/tinyclaw:${IMAGE_TAG}"
          kubectl -n claw set image deployment/clawman clawman="${IMAGE_REF}"

      - name: Wait rollout
        run: |
          kubectl -n claw rollout status deployment/clawman --timeout=300s
