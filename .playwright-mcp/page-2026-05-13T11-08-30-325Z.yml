- main [ref=e2]:
  - generic [ref=e3]:
    - heading "TinyClaw 目标架构设计报告" [level=1] [ref=e4]
    - paragraph [ref=e5]: 本报告按全新目标架构设计 TinyClaw，不保留历史兼容层，不为旧 sandbox agent 数据面做 fallback。系统以 gRPC 写入消息、PostgreSQL 状态机、主服务模型运行、 sandbox 工具执行、jobs outbox 为核心边界。
    - generic [ref=e6]:
      - generic [ref=e7]: 日期：2026-05-13
      - generic [ref=e8]: 范围：目标架构
      - generic [ref=e9]: 约束：不考虑历史包袱
  - generic [ref=e10]:
    - heading "1. 目标" [level=2] [ref=e11]
    - paragraph [ref=e12]: TinyClaw 的目标形态是一个消息驱动的 AI worker 服务。入口只负责写入事实， 调度层负责可靠处理，模型层在主服务内完成推理，sandbox 只执行需要隔离的工具。
    - list [ref=e13]:
      - listitem [ref=e14]:
        - text: 唯一正式入口：
        - code [ref=e15]: SubmitMessages
        - text: gRPC。
      - listitem [ref=e16]:
        - text: 唯一入站事实源：
        - code [ref=e17]: messages
        - text: 。
      - listitem [ref=e18]: 唯一处理驱动：pending message dispatcher。
      - listitem [ref=e19]:
        - text: 默认模型调用：主服务内
        - code [ref=e20]: AgentRunner
        - text: 。
      - listitem [ref=e21]:
        - text: 隔离执行：sandbox
        - code [ref=e22]: ToolExecutor
        - text: 。
      - listitem [ref=e23]:
        - text: 唯一外发事实源：
        - code [ref=e24]: jobs
        - text: outbox。
    - generic [ref=e25]: 入口 RPC 不直接调用模型，不直接写 jobs，不绕过 messages 状态机。
  - generic [ref=e26]:
    - heading "2. 架构原则" [level=2] [ref=e27]
    - generic [ref=e28]:
      - generic [ref=e29]:
        - heading "事实先落库" [level=3] [ref=e30]
        - paragraph [ref=e31]:
          - text: 任何输入先写入
          - code [ref=e32]: messages
          - text: ，再由 dispatcher 异步处理。
      - generic [ref=e33]:
        - heading "单一状态机" [level=3] [ref=e34]
        - paragraph [ref=e35]:
          - text: 消息只通过
          - code [ref=e36]: pending -> processing -> done/failed
          - text: 推进。
      - generic [ref=e37]:
        - heading "主服务持有推理循环" [level=3] [ref=e38]
        - paragraph [ref=e39]: prompt、模型调用、tool loop、最终回复生成都在主服务内完成。
      - generic [ref=e40]:
        - heading "sandbox 最小职责" [level=3] [ref=e41]
        - paragraph [ref=e42]: sandbox 只执行工具调用，不拥有会话调度、消息状态和外发状态。
  - generic [ref=e43]:
    - heading "3. 总体架构" [level=2] [ref=e44]
    - code [ref=e46]: Message Producer └─ SubmitMessages(gRPC) │ ▼ +-----------------------------+ | Ingress API | | - authenticate | | - validate | | - normalize | | - insert messages | +-------------+---------------+ │ ▼ +-----------------------------+ | PostgreSQL messages | | pending / processing / | | done / failed / ignored | +-------------+---------------+ │ ▼ +-----------------------------+ | Dispatcher | | - claim work atomically | | - load room context | | - call AgentRunner | +-------------+---------------+ │ ▼ +-----------------------------+ | AgentRunner in clawman | | - prompt builder | | - model client | | - tool call loop | +-------------+---------------+ │ tool calls ▼ +-----------------------------+ | Sandbox ToolExecutor | | - execute isolated tools | | - return structured result | +-------------+---------------+ │ ▼ +-----------------------------+ | PostgreSQL jobs | | - reply outbox | | - Android pull | +-----------------------------+
  - generic [ref=e47]:
    - heading "4. 领域模型" [level=2] [ref=e48]
    - heading "4.1 messages" [level=3] [ref=e49]
    - paragraph [ref=e50]:
      - code [ref=e51]: messages
      - text: 保存所有入站事实和处理状态。它不保存模型中间推理， 也不保存工具调用明细。
    - code [ref=e53]: CREATE TABLE messages ( id UUID PRIMARY KEY, tenant_id TEXT NOT NULL, source TEXT NOT NULL, source_message_id TEXT NOT NULL, room_id TEXT NOT NULL, chat_type TEXT NOT NULL CHECK (chat_type IN ('direct', 'group')), from_id TEXT NOT NULL, from_name TEXT NOT NULL DEFAULT '', payload JSONB NOT NULL, status TEXT NOT NULL CHECK ( status IN ('pending', 'processing', 'done', 'failed', 'ignored') ), available_at TIMESTAMPTZ NOT NULL DEFAULT NOW(), locked_at TIMESTAMPTZ, attempt_count INTEGER NOT NULL DEFAULT 0, last_error TEXT NOT NULL DEFAULT '', msg_time TIMESTAMPTZ NOT NULL, created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(), updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW(), UNIQUE (tenant_id, source, source_message_id) );
    - heading "4.2 rooms" [level=3] [ref=e54]
    - paragraph [ref=e55]:
      - code [ref=e56]: rooms
      - text: 保存 room 级元数据和运行策略，不承担消息游标。
    - code [ref=e58]: "CREATE TABLE rooms ( tenant_id TEXT NOT NULL, room_id TEXT NOT NULL, chat_type TEXT NOT NULL CHECK (chat_type IN ('direct', 'group')), title TEXT NOT NULL DEFAULT '', runner_policy JSONB NOT NULL DEFAULT '{}'::jsonb, created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(), updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW(), PRIMARY KEY (tenant_id, room_id) );"
    - heading "4.3 jobs" [level=3] [ref=e59]
    - paragraph [ref=e60]:
      - code [ref=e61]: jobs
      - text: 是外发 outbox。只有最终需要发送给用户的回复进入 jobs。
    - code [ref=e63]: CREATE TABLE jobs ( id UUID PRIMARY KEY, seq BIGSERIAL UNIQUE, tenant_id TEXT NOT NULL, bot_id TEXT NOT NULL, recipient_alias TEXT NOT NULL, message TEXT NOT NULL, source_message_ids UUID[] NOT NULL, idempotency_key TEXT NOT NULL, created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(), UNIQUE (tenant_id, idempotency_key) );
    - heading "4.4 tool_calls" [level=3] [ref=e64]
    - paragraph [ref=e65]:
      - code [ref=e66]: tool_calls
      - text: 保存工具调用审计和重试边界。工具执行是独立状态机， 不污染 messages 状态。
    - code [ref=e68]: CREATE TABLE tool_calls ( id UUID PRIMARY KEY, tenant_id TEXT NOT NULL, room_id TEXT NOT NULL, message_batch_id UUID NOT NULL, tool_name TEXT NOT NULL, input JSONB NOT NULL, output JSONB, status TEXT NOT NULL CHECK ( status IN ('pending', 'running', 'succeeded', 'failed') ), error TEXT NOT NULL DEFAULT '', created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(), updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW() );
  - generic [ref=e69]:
    - heading "5. gRPC 契约" [level=2] [ref=e70]
    - heading "5.1 Ingress API" [level=3] [ref=e71]
    - code [ref=e73]: "service ClawmanIngress { rpc SubmitMessages(SubmitMessagesRequest) returns (SubmitMessagesResponse); }"
    - code [ref=e75]: "message SubmitMessagesRequest { string tenant_id = 1; repeated InboundMessage messages = 2; } message InboundMessage { string source = 1; string source_message_id = 2; string room_id = 3; string chat_type = 4; string from_id = 5; string from_name = 6; string msg_time = 7; bytes payload_json = 8; } message SubmitMessagesResponse { int32 accepted = 1; int32 duplicated = 2; repeated string message_ids = 3; }"
    - heading "5.2 Tool Runtime API" [level=3] [ref=e76]
    - code [ref=e78]: "service ToolRuntime { rpc ExecuteTool(ExecuteToolRequest) returns (ExecuteToolResponse); } message ExecuteToolRequest { string tenant_id = 1; string room_id = 2; string call_id = 3; string tool_name = 4; bytes input_json = 5; } message ExecuteToolResponse { string call_id = 1; bytes output_json = 2; }"
    - generic [ref=e79]: 工具执行使用 unary RPC。需要流式输出时再单独引入 streaming tool API， 不把普通工具调用一开始就设计成双向流。
  - generic [ref=e80]:
    - heading "6. 处理流程" [level=2] [ref=e81]
    - list [ref=e82]:
      - listitem [ref=e83]:
        - text: Producer 调用
        - code [ref=e84]: SubmitMessages
        - text: 。
      - listitem [ref=e85]:
        - text: Ingress 校验租户、来源、room、payload，并按幂等键写入
        - code [ref=e86]: messages
        - text: 。
      - listitem [ref=e87]:
        - text: Dispatcher 原子 claim 一组 pending 消息，状态改为
        - code [ref=e88]: processing
        - text: 。
      - listitem [ref=e89]: Dispatcher 读取 room metadata 和当前处理批次上下文。
      - listitem [ref=e90]:
        - code [ref=e91]: AgentRunner
        - text: 构造 prompt 并调用模型。
      - listitem [ref=e92]:
        - text: 模型请求 tool 时，
        - code [ref=e93]: AgentRunner
        - text: 调用
        - code [ref=e94]: ToolExecutor
        - text: 。
      - listitem [ref=e95]:
        - code [ref=e96]: ToolExecutor
        - text: 确保 sandbox 存在，执行工具并返回结构化结果。
      - listitem [ref=e97]:
        - code [ref=e98]: AgentRunner
        - text: 继续模型循环，直到得到最终回复。
      - listitem [ref=e99]:
        - text: 服务以幂等键写入
        - code [ref=e100]: jobs
        - text: 。
      - listitem [ref=e101]:
        - text: 写入 jobs 成功后，消息状态改为
        - code [ref=e102]: done
        - text: 。
