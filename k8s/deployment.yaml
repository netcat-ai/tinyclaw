apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawman
  namespace: claw
  labels:
    app: clawman
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: clawman
  template:
    metadata:
      labels:
        app: clawman
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      serviceAccountName: clawman
      hostAliases:
        - ip: "183.47.100.66"
          hostnames:
            - qyapi.weixin.qq.com
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: region
                    operator: In
                    values:
                      - sz
      containers:
        - name: clawman
          image: ghcr.io/netcat-ai/tinyclaw:IMAGE_PLACEHOLDER
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: control-api
          envFrom:
            - configMapRef:
                name: tinyclaw-config
            - secretRef:
                name: tinyclaw-secret
          volumeMounts:
            - name: codex-auth
              mountPath: /root/.codex/auth.json
              subPath: auth.json
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: codex-auth
          secret:
            secretName: tinyclaw-secret
            items:
              - key: CODEX_AUTH_JSON
                path: auth.json
