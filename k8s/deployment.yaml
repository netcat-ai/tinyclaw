apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawman
  namespace: claw
  labels:
    app: clawman
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: clawman
  template:
    metadata:
      labels:
        app: clawman
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      serviceAccountName: clawman
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: region
                    operator: In
                    values:
                      - bj
                      - sz
                      - sh
      containers:
        - name: clawman
          image: ghcr.io/netcat-ai/tinyclaw:IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              name: control-api
          envFrom:
            - configMapRef:
                name: tinyclaw-config
            - secretRef:
                name: tinyclaw-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
