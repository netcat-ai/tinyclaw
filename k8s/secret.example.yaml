apiVersion: v1
kind: Secret
metadata:
  name: tinyclaw-secret
  namespace: claw
type: Opaque
stringData:
  DATABASE_URL: "postgres://tinyclaw:tinyclaw@postgres.claw.svc.cluster.local:5432/tinyclaw?sslmode=disable"
  CLAWMAN_API_TOKEN: "replace-me"
  CLAWMAN_ADMIN_SECRET: "replace-me"
  CODEX_AUTH_JSON: "replace-me"
  IMAGE_PROVIDER_API_KEY: ""
  GENERATED_MEDIA_S3_ACCESS_KEY_ID: "replace-me"
  GENERATED_MEDIA_S3_SECRET_ACCESS_KEY: "replace-me"
  CODEX_CONFIG_TOML: |
    model_provider = "OpenAI"
    model = "gpt-5.5"
    review_model = "gpt-5.5"
    model_reasoning_effort = "xhigh"
    disable_response_storage = true
    network_access = "enabled"
    windows_wsl_setup_acknowledged = true
    model_context_window = 1000000
    model_auto_compact_token_limit = 900000

    [model_providers.OpenAI]
    name = "OpenAI"
    base_url = "https://code.v4.chat"
    wire_api = "responses"
    requires_openai_auth = true
