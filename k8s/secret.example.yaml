apiVersion: v1
kind: Secret
metadata:
  name: tinyclaw-secret
  namespace: claw
type: Opaque
stringData:
  DATABASE_URL: "postgres://tinyclaw:tinyclaw@postgres.claw.svc.cluster.local:5432/tinyclaw?sslmode=disable"
  WECOM_CORP_SECRET: "replace-me"
  WECOM_RSA_PRIVATE_KEY: |
    -----BEGIN RSA PRIVATE KEY-----
    replace-me
    -----END RSA PRIVATE KEY-----
  WECOM_CONTACT_SECRET: "replace-me"
  WORKTOOL_ROBOT_ID: "replace-me"
  ANTHROPIC_API_KEY: "replace-me"
