apiVersion: v1
kind: ConfigMap
metadata:
  name: tinyclaw-config
  namespace: claw
data:
  CONTROL_API_ADDR: ":8081"
  METRICS_ADDR: ":9090"
  WECOM_CORP_ID: "replace-me"
  WECOM_BOT_ID: "replace-me"
  AGENT_RUNNER: "codex"
  CODEX_WORKDIR: "/tmp"
  CODEX_MODEL: "gpt-5.5"
  CODEX_SANDBOX: "read-only"
  CODEX_BASE_URL: "https://code.v4.chat"
  CODEX_API_KEY_ENV: "ANTHROPIC_API_KEY"
  WECOM_ENABLED: "true"
  WECOM_POLL_INTERVAL: "3s"
  WECOM_POLL_LIMIT: "100"
  WECOM_SDK_TIMEOUT: "30"
  WECOM_START_SEQ: "0"
