apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: tinyclaw-agent-template
  namespace: claw
spec:
  podTemplate:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: agent
          image: ghcr.io/fishioon/tinyclaw-agent:latest
          ports:
            - containerPort: 8888
              protocol: TCP
          env:
            - name: AGENT_SERVER_PORT
              value: "8888"
            - name: AGENT_RUNTIME_MODE
              value: "claude_agent_sdk"
            - name: AGENT_WORKDIR
              value: "/workspace"
            - name: AGENT_TMPDIR
              value: "/tmp"
            - name: ANTHROPIC_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: tinyclaw-config
                  key: ANTHROPIC_BASE_URL
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tinyclaw-secret
                  key: ANTHROPIC_API_KEY
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8888
            initialDelaySeconds: 0
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8888
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
