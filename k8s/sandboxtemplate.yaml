apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: tinyclaw-agent-template
  namespace: claw
spec:
  podTemplate:
    spec:
      restartPolicy: OnFailure
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: region
                    operator: In
                    values:
                      - bj
                      - sz
                      - sh
      containers:
        - name: agent
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8888
              protocol: TCP
          env:
            - name: AGENT_SERVER_PORT
              value: "8888"
            - name: AGENT_RUNTIME_MODE
              value: "claude_agent_sdk"
            - name: AGENT_WORKDIR
              value: "/workspace"
            - name: AGENT_TMPDIR
              value: "/tmp"
            - name: CLAWMAN_GRPC_ADDR
              valueFrom:
                configMapKeyRef:
                  name: tinyclaw-config
                  key: CLAWMAN_GRPC_ADDR
            - name: CLAUDE_RUNTIME_TIMEOUT_MS
              value: "240000"
            - name: CLAUDE_SYSTEM_PROMPT_APPEND
              value: |
                你是私云小虾，私云科技的二号助理，一号是私云虾虾。回答可以活波调皮一些，机灵但不讨人厌。
                默认使用中文回答。
            - name: ANTHROPIC_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: tinyclaw-config
                  key: ANTHROPIC_BASE_URL
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tinyclaw-secret
                  key: ANTHROPIC_API_KEY
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8888
            initialDelaySeconds: 0
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8888
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
